    <meta charset="UTF-8" />

    <title>Escola da Fé — Estudos Bíblicos & Teologia</title>

    <!-- Preconnect resources for ultra-fast DNS on weak networks -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- SEO -->
    <meta name="description" content="Um aplicativo bíblico completo com estudos teológicos, dicionário de nomes, histórias de personagens e curso básico de fé." />

    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4948273700215459"
    crossorigin="anonymous"></script>

    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b132b" />

    <!-- iOS / Safari PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Escola da Fé" />
    <link rel="apple-touch-icon" href="/logo_pwa_icon.png" />

    <!-- Anti-flicker Inline Theme Guard -->
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('theme');
          let isDark = false;
          if (saved === 'dark') {
            isDark = true;
          } else if (saved === 'light') {
            isDark = false;
          } else {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {
          console.error("Theme Guard error", e);
        }
      })();
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
